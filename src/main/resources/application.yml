spring:
  application:
    name: deskflow-api

  datasource:
    url: jdbc:h2:mem:deskflow;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      # H2 dev: Hibernate builds tables from the entities on each startup and
      # drops them on shutdown (ARCHITECTURE.md §9 — zero setup for teammates).
      ddl-auto: create-drop
    open-in-view: false
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
