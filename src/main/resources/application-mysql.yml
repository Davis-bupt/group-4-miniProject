spring:
  datasource:
    url: jdbc:mysql://localhost:3306/deskflow?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root

  jpa:
    hibernate:
      # MySQL demo: incrementally sync tables to the entities, never drop data
      # (ARCHITECTURE.md §9).
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect

  h2:
    console:
      enabled: false
