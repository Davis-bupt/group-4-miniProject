spring:
  datasource:
    url: jdbc:mysql://localhost:3306/deskflow?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root

  jpa:
    hibernate:
      # none = schema owned by the data lead's schema.sql, not auto-generated.
      ddl-auto: none
    database-platform: org.hibernate.dialect.MySQLDialect

  h2:
    console:
      enabled: false
